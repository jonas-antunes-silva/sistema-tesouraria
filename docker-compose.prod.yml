services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/prod:/etc/nginx/ssl:ro
    depends_on:
      - nuxt
    networks:
      - tesouraria_net
    restart: unless-stopped

  nuxt:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: prod
    expose:
      - "3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    volumes:
      - .secrets/sisgru.key:/run/secrets/sisgru.key:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tesouraria_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    env_file:
      - .env.prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tesouraria}
      - POSTGRES_USER=${POSTGRES_USER:-tesouraria}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tesouraria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tesouraria}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tesouraria_net:
    driver: bridge
