# Override de produção — usar com:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/prod:/etc/nginx/ssl:ro

  nuxt:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: node .output/server/index.mjs
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    volumes:
      - /app/node_modules
    # Sem bind mount do código fonte (sem hot-reload)

  postgres:
    env_file:
      - .env.prod

  pgadmin:
    # pgAdmin desabilitado em produção
    profiles:
      - disabled
